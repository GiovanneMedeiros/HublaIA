version: '3.8'

services:
  # PostgreSQL - Banco de Dados Principal
  postgres:
    image: postgres:15-alpine
    container_name: hublaia-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hublaia_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache e Sessions
  redis:
    image: redis:7-alpine
    container_name: hublaia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prisma Studio (opcional - para visualizar BD)
  prisma-studio:
    image: node:18-alpine
    container_name: hublaia-prisma-studio
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    command: npx prisma studio --browser none
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hublaia_dev

volumes:
  postgres_data:
  redis_data:
